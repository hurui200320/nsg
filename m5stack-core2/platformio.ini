; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = m5stack-core2-release

[env:m5stack-core2-base]
; use pioarduino/platform-espressif32, since platformio itself sucks
; this version is Arduino Release v3.3.9 based on ESP-IDF v5.5.4
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = m5stack-core2
framework = arduino
upload_speed = 921600
monitor_speed = 115200
board_build.partitions = default_16MB.csv
build_flags =
    -DBOARD_HAS_PSRAM
    -DUNITY_SUPPORT_64
custom_sdkconfig =
    CONFIG_ESP32_REV_MIN=3
    ; Disable unused BT profiles to free IRAM0 (cache workaround eats ~10KB).
    ; Project uses only: BLE GATT client + SPP classic BT + SMP bonding.
    ; GATTS cannot be disabled: Arduino BLE library unconditionally references
    ; esp_ble_gatts_set_attr_value (BLEDescriptor.cpp).
    CONFIG_BT_A2DP_ENABLE=n
    CONFIG_BT_HFP_ENABLE=n
    CONFIG_BT_BLE_BLUFI_ENABLE=n
    ; Disable WiFi — project is Bluetooth-only, no WiFi references anywhere.
    CONFIG_ESP_WIFI_ENABLED=n
    ; Shrink SPIRAM cache-workaround IRAM footprint. The core libc functions
    ; (memset/memcpy/memcmp/strlen/strcmp/strcat/itoa) stay in IRAM always;
    ; only the optional groups below are disabled. These functions are not
    ; called inside cache-disabled windows (flash erase/write, NVS, BT crypto).
    CONFIG_SPIRAM_CACHE_LIBJMP_IN_IRAM=n
    CONFIG_SPIRAM_CACHE_LIBMATH_IN_IRAM=n
    CONFIG_SPIRAM_CACHE_LIBNUMPARSER_IN_IRAM=n
    CONFIG_SPIRAM_CACHE_LIBIO_IN_IRAM=n
    CONFIG_SPIRAM_CACHE_LIBTIME_IN_IRAM=n
    CONFIG_SPIRAM_CACHE_LIBCHAR_IN_IRAM=n
    CONFIG_SPIRAM_CACHE_LIBMEM_IN_IRAM=n
    CONFIG_SPIRAM_CACHE_LIBSTR_IN_IRAM=n
    CONFIG_SPIRAM_CACHE_LIBRAND_IN_IRAM=n
    CONFIG_SPIRAM_CACHE_LIBENV_IN_IRAM=n
    CONFIG_SPIRAM_CACHE_LIBFILE_IN_IRAM=n
    CONFIG_SPIRAM_CACHE_LIBMISC_IN_IRAM=n
    ; Place non-ISR FreeRTOS / ringbuf / heap functions into flash (per ESP-IDF
    ; IRAM-optimization guide). All three are documented as safe to enable in
    ; all configurations, provided their functions aren't called from IRAM
    ; ISRs (they aren't in this project). Frees ~3KB+ of IRAM.
    CONFIG_FREERTOS_PLACE_FUNCTIONS_INTO_FLASH=y
    CONFIG_RINGBUF_PLACE_FUNCTIONS_INTO_FLASH=y
    CONFIG_HEAP_PLACE_FUNCTION_INTO_FLASH=y
lib_deps =
; https://github.com/m5stack/M5Unified/tree/master
; https://registry.platformio.org/libraries/m5stack/M5Unified
    m5stack/M5Unified @ 0.2.17
; TODO: find a better GPS/NMEA library?
; https://github.com/mikalhart/TinyGPSPlus
; https://registry.platformio.org/libraries/mikalhart/TinyGPSPlus
    mikalhart/TinyGPSPlus @ 1.1.0
    bblanchon/ArduinoJson @ 7.4.3

[env:m5stack-core2-debug]
extends = env:m5stack-core2-base
build_type = debug
build_flags =
    ${env:m5stack-core2-base.build_flags}
    -DCORE_DEBUG_LEVEL=3
    -DNSG_LOG_LEVEL=0

[env:m5stack-core2-release]
extends = env:m5stack-core2-base
build_type = release
build_flags =
    ${env:m5stack-core2-base.build_flags}
    -DCORE_DEBUG_LEVEL=0
    -DNSG_LOG_LEVEL=1

; for testing the libs
; $ pio test -e native
[env:native]
platform = native
test_build_src = no
build_flags =
    -std=gnu++17
    -DUNITY_SUPPORT_64
